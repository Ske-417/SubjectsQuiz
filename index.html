<!doctype html>
<html lang='ja'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>ニガテ発見AIクイズ</title>
  <link rel='stylesheet' href='style.css'>
</head>
<body>
  <main class='app'>
    <section id='startScreen' class='container'>
      <h1>ニガテ発見AIクイズ</h1>
      <p class='lead'>問題に答えると、点数だけでなく、どの分野でつまずいたかを分析します。</p>

      <h2>問題レベルを選んでください</h2>
      <div class='level-grid'>
        <button class='level-btn' data-level='junior'>中学生 <span>計算、文章題、図形、英語、理科、社会</span></button>
        <button class='level-btn' data-level='high'>高校生 <span>数学、国語、英語、理科、社会、情報</span></button>
      </div>

      <button id='startButton' class='main-btn' disabled>診断スタート</button>
    </section>

    <section id='quizScreen' class='container hidden'>
      <div class='top-row'>
        <span id='questionCounter'>問題 1 / 15</span>
        <span id='levelLabel'>中学生</span>
      </div>
      <div class='progress'>
        <div id='progressBar' class='progress-bar'></div>
      </div>

      <div class='meta-row'>
        <div id='fieldChip' class='chip'>分野</div>
        <div id='timer' class='timer'>0秒 / 目安0秒</div>
      </div>

      <div id='questionText' class='question-text'></div>
      <div id='questionFigure' class='figure-box hidden'></div>
      <div id='choices' class='choices'></div>
      <div id='feedback' class='feedback'>答えを選ぶと、ここに解説が表示されます。</div>

      <div id='miniStats' class='mini-stats'></div>

      <div class='button-row'>
        <button id='nextButton' class='main-btn' disabled>次の問題へ</button>
        <button id='quitButton' class='sub-btn'>最初に戻る</button>
      </div>
    </section>

    <section id='loadingScreen' class='container hidden'>
      <div class='loading'>
        <strong>AI診断中...</strong>
        <p>正解率、間違いタイプ、回答時間を分析しています。</p>
      </div>
    </section>

    <section id='resultScreen' class='container hidden'>
      <h1 id='typeTitle'>あなたの苦手タイプ</h1>
      <p id='typeSummary' class='lead'></p>
      <div id='score' class='score'></div>
      <p id='timeScore' class='score-sub'></p>

      <div class='section'>
        <h3>分野別 正解率</h3>
        <div id='fieldBars'></div>
      </div>

      <div class='section'>
        <h3>苦手ランキング</h3>
        <ul id='weakRanking' class='list'></ul>
      </div>

      <div class='section'>
        <h3>時間の使い方アドバイス</h3>
        <ul id='timeAdviceList' class='list'></ul>
      </div>

      <div class='section'>
        <h3>おすすめの勉強方法</h3>
        <ul id='adviceList' class='list'></ul>
      </div>

      <div class='section'>
        <h3>間違えた問題・時間がかかった問題</h3>
        <ul id='wrongList' class='list'></ul>
      </div>

      <div class='button-row' style='margin-top: 18px;'>
        <button id='restartButton' class='main-btn'>もう一度挑戦</button>
        <button id='backStartButton' class='sub-btn'>レベルを選び直す</button>
      </div>
    </section>
  </main>

  <script src='data.js'></script>
  <script src='main.js'></script>
</body>
</html>
